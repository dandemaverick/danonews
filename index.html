<!doctype html>
<html lang="en">
  <head>
    <!-- AdSense -->
    <script async
      src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-XXXXXXXXXXXXXXXX"
      crossorigin="anonymous"></script>

    <!-- Meta -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO -->
    <title>DanoNews - Latest News & Updates</title>
    <meta name="description" content="Stay updated with the latest news, trends, and insights from around the world." />
    <meta name="keywords" content="news, updates, blog, world news" />
    <meta name="author" content="DanoNews" />

    <!-- Open Graph (Social Sharing) -->
    <meta property="og:title" content="DanoNews" />
    <meta property="og:description" content="Latest news and updates" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/preview.png" />

    <!-- Favicon -->
    <link rel="icon" href="/favicon.svg" />

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

    <!-- Base Styling -->
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: 'Inter', sans-serif;
        background-color: #0f172a;
        color: #e2e8f0;
        line-height: 1.6;
      }

      #root {
        min-height: 100vh;
      }

      /* Smooth loading fallback */
      .loader {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        font-size: 1.2rem;
        color: #94a3b8;
      }
    </style>
  </head>

  <body>
    <div id="root">
      <div class="loader">Loading DanoNews...</div>
    </div>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
